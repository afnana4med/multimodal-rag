# Streamlit theme — clean "AI-native" chat (Kimi-style): light, airy, Inter.
[theme]
base = "light"
primaryColor = "#4F46E5"            # indigo accent (send / primary actions)
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA" # sidebar / subtle surfaces
textColor = "#0F172A"               # slate-900, high contrast
font = "sans serif"                 # Inter layered on via CSS

[server]
maxUploadSize = 50
